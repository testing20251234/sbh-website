<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packages — Sauna Bath House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #faf8f5;
      color: #3d3229;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e8e0d6;
      position: sticky;
      top: 0;
      background: rgba(250, 248, 245, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #3d3229;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #8b7355;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: #3d3229;
    }

    .back-btn svg {
      width: 14px;
      height: 14px;
    }

    /* ── Main ── */
    .hero {
      text-align: center;
      padding: 3.5rem 2rem 2rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      font-weight: 300;
      color: #3d3229;
      margin-bottom: 0.6rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: #8b7355;
      font-weight: 300;
    }

    /* ── Widget ── */
    .widget-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    hapana-widget {
      display: block;
      width: 100%;
      min-height: 500px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #e8e0d6;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: #8b7355;
    }

    footer a {
      color: #8b7355;
      text-decoration: underline;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 1rem 1.25rem; }
      .hero { padding: 2.5rem 1.25rem 1.5rem; }
      .widget-section { padding: 1.5rem 1rem 4rem; }
    }
  </style>
</head>
<body>

  <header>
    <a href="https://www.houselongevity.com" class="logo">Sauna Bath House</a>
    <a href="https://www.houselongevity.com" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
  </header>

  <main>
    <div class="hero">
      <h1>Our Packages</h1>
      <p>Choose the membership that fits your lifestyle.</p>
    </div>

    <div class="widget-section">
      <hapana-widget data-type="packages" widget-id="bStRSmJzMTlWV0lxa0JJZllwOXd3QT09" package-id="" variant="" ></hapana-widget>
    </div>
  </main>

  <footer>
    &copy; 2026 Sauna Bath House &middot; <a href="https://www.houselongevity.com">houselongevity.com</a> &middot; <a href="https://saunabathhouse.com/">saunabathhouse.com</a>
  </footer>

  <script src="https://widget.hapana.com/hapana_widget.js"></script>
</body>
</html>
